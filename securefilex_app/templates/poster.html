<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Poster | SecureFileX</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .container {
      width: 100%;
      height: 100vh;
      background-color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .buttons-container {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
    }

    .btn {
      background-color: #007bff;
      color: #fff;
      border: none;
      padding: 10px 14px;
      margin-right: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background-color: #0056b3;
    }

    .btn-back {
      background-color: #28a745;
    }

    .btn-back:hover {
      background-color: #218838;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      color: #333;
    }

    .footer a {
      color: #007bff;
      font-weight: bold;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="buttons-container">
    <a href="javascript:history.back()" class="btn btn-back">⬅ Back</a>
    <button onclick="toggleFullScreen()" class="btn">Toggle Fullscreen</button>
  </div>

  <div class="container" id="poster-container">
    <iframe id="poster-iframe"
      src="https://www.canva.com/design/DAGmwz91bNQ/Qeyz-_xUHo9sprCl-32Izw/watch?embed"
      allowfullscreen="allowfullscreen" loading="lazy">
    </iframe>
  </div>

  <div class="footer">
    <p>
      Poster by <strong>DAVINDER SINGH DEOSI</strong> &nbsp;|&nbsp;
      <a href="https://www.canva.com/design/DAGmwz91bNQ/Qeyz-_xUHo9sprCl-32Izw/watch?utm_content=DAGmwz91bNQ&utm_campaign=designshare&utm_medium=embeds&utm_source=link"
        target="_blank" rel="noopener noreferrer">
        View on Canva
      </a>
    </p>
  </div>

  <script>
    function toggleFullScreen() {
      const container = document.getElementById('poster-container');
      if (!document.fullscreenElement) {
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) {
          container.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }
  </script>

</body>

</html>
