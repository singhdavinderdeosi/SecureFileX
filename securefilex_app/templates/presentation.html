<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Presentation | SecureFileX</title>
    <!-- Add your CSS for the design -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: 100vh;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
            color: #333;
        }

        .footer a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .buttons-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 999;
        }

        .btn {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            margin-right: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-back {
            background-color: #28a745;
        }

        .btn-back:hover {
            background-color:rgb(10, 175, 180);
        }

        .btn-fullscreen {
            background-color:rgb(14, 150, 192);
        }

        .btn-fullscreen:hover {
            background-color:rgb(44, 117, 10);
        }
    </style>
</head>

<body>

    <div class="buttons-container">
        <!-- Back button -->
        <a href="javascript:history.back()" class="btn btn-back">⬅ Back</a>
        <!-- Toggle fullscreen button -->
        <button onclick="toggleFullScreen()" class="btn btn-fullscreen">Toggle Fullscreen</button>
    </div>

    <div class="container" id="presentation-container">
        <!-- Fullscreen iframe to render the presentation -->
        <iframe id="presentation-iframe" src="https://www.canva.com/design/DAGkWZWVHoY/oq1mfx6Jn4dTX8XeztLBdA/view?embed"
            allowfullscreen="allowfullscreen"></iframe>
    </div>

    <!-- JavaScript for fullscreen toggle -->
    <script>
        function toggleFullScreen() {
            const iframe = document.getElementById('presentation-iframe');
            const container = document.getElementById('presentation-container');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.mozRequestFullScreen) { // Firefox
                    container.mozRequestFullScreen();
                } else if (container.webkitRequestFullscreen) { // Chrome, Safari and Opera
                    container.webkitRequestFullscreen();
                } else if (container.msRequestFullscreen) { // IE/Edge
                    container.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) { // Firefox
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) { // Chrome, Safari and Opera
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { // IE/Edge
                    document.msExitFullscreen();
                }
            }
        }
    </script>

</body>

</html>
