<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SecureFileX Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom CSS -->
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
    }
    .card {
      background-color: #1e1e1e;
    }
    .table thead th {
      color: #ffffff;
    }
    .table tbody tr {
      color: #ffffff;
    }
    .form-select, .form-control {
      background-color: #1e1e1e;
      color: #ffffff;
      border: 1px solid #6c757d;
    }
    .form-select:focus, .form-control:focus {
      background-color: #1e1e1e;
      color: #ffffff;
      border-color: #0d6efd;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <!-- Header -->
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold text-info">🔐 SecureFileX Dashboard</h1>
      <p class="text-secondary">Monitor and manage your encryption activities seamlessly.</p>
    </div>

    <!-- Filters -->
    <div class="row mb-4">
      <div class="col-md-6">
        <label for="algorithmFilter" class="form-label">Filter by Algorithm:</label>
        <select id="algorithmFilter" class="form-select" onchange="populateLogs()">
          <option value="">All</option>
          <option value="Fernet (AES)">Fernet (AES)</option>
          <option value="ChaCha20">ChaCha20</option>
          <option value="RSA">RSA</option>
          <option value="AES (PyCryptodome)">AES (PyCryptodome)</option>
          <option value="SHA256 Checksum Only">SHA256 Checksum Only</option>
        </select>
      </div>
      <div class="col-md-6">
        <label for="actionFilter" class="form-label">Filter by Action:</label>
        <select id="actionFilter" class="form-select" onchange="populateLogs()">
          <option value="">All</option>
          <option value="Encrypt">Encrypt</option>
          <option value="Decrypt">Decrypt</option>
          <option value="Hide">Hide</option>
          <option value="Extract">Extract</option>
        </select>
      </div>
    </div>

    <!-- Export Buttons -->
    <div class="mb-4">
      <button id="exportCSV" class="btn btn-outline-info me-2"><i class="fas fa-file-csv"></i> Export CSV</button>
      <button id="exportJSON" class="btn btn-outline-success"><i class="fas fa-file-code"></i> Export JSON</button>
    </div>

    <!-- Logs Table -->
    <div class="table-responsive mb-5">
      <table class="table table-dark table-striped" id="logsTable">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>User</th>
            <th>Action</th>
            <th>Algorithm</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="logsBody">
          <!-- Logs will be populated here -->
        </tbody>
      </table>
    </div>

    <!-- Timeline Chart -->
    <div class="card mb-5">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">📈 Activity Timeline</h5>
      </div>
      <div class="card-body">
        <canvas id="timelineChart" height="100"></canvas>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script>
    // Sample log data
    let logs = [
      { timestamp: '2025-04-22 16:30:00', user: 'Alice', action: 'Encrypt', algorithm: 'Fernet (AES)', status: 'Success' },
      { timestamp: '2025-04-22 16:35:00', user: 'Bob', action: 'Decrypt', algorithm: 'RSA', status: 'Success' },
      { timestamp: '2025-04-22 16:40:00', user: 'Charlie', action: 'Hide', algorithm: 'ChaCha20', status: 'Success' },
      { timestamp: '2025-04-22 16:45:00', user: 'Dana', action: 'Extract', algorithm: 'AES (PyCryptodome)', status: 'Failed' },
      { timestamp: '2025-04-22 16:50:00', user: 'Eve', action: 'Encrypt', algorithm: 'SHA256 Checksum Only', status: 'Success' }
    ];

    // Function to populate logs table
    function populateLogs() {
      const logsBody = document.getElementById('logsBody');
      logsBody.innerHTML = '';
      const algorithmFilter = document.getElementById('algorithmFilter').value;
      const actionFilter = document.getElementById('actionFilter').value;

      const filteredLogs = logs.filter(log => {
        return (algorithmFilter === '' || log.algorithm === algorithmFilter) &&
               (actionFilter === '' || log.action === actionFilter);
      });

      filteredLogs.forEach(log => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${log.timestamp}</td>
          <td>${log.user}</td>
          <td>${log.action}</td>
          <td>${log.algorithm}</td>
          <td>${log.status}</td>
        `;
        logsBody.appendChild(row);
      });
    }

    // Function to export logs as CSV
    function exportCSV() {
      const headers = ['Timestamp', 'User', 'Action', 'Algorithm', 'Status'];
      const rows = logs.map(log => [log.timestamp, log.user, log.action, log.algorithm, log.status]);
      let csvContent = 'data:text/csv;charset=utf-8,' + headers.join(',') + '\n' + rows.map(e => e.join(',')).join('\n');
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement('a');
      link.setAttribute('href', encodedUri);
      link.setAttribute('download', 'logs.csv');
      link.click();
    }

    // Function to export logs as JSON
    function exportJSON() {
      const jsonContent = JSON.stringify(logs, null, 2);
      const blob = new Blob([jsonContent], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'logs.json';
      link.click();
    }

    // Chart.js Timeline chart
    const ctx = document.getElementById('timelineChart').getContext('2d');
    const timelineChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['2025-04-22 16:30', '2025-04-22 16:35', '2025-04-22 16:40', '2025-04-22 16:45', '2025-04-22 16:50'],
        datasets: [{
          label: 'Actions',
          data: [1, 2, 3, 4, 5],
          borderColor: '#00cc88',
          backgroundColor: 'rgba(0, 204, 136, 0.2)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            display: false
          }
        }
      }
    });

    // Event listeners for export buttons
    document.getElementById('exportCSV').addEventListener('click', exportCSV);
    document.getElementById('exportJSON').addEventListener('click', exportJSON);

    // Initialize logs on page load
    populateLogs();
  </script>
</body>
</html>
